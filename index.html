<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite Especial - 80 Anos de Adejaci</title>
    
    <!-- Meta tags SEO -->
    <meta name="description" content="Você está convidado para a grande celebração dos 80 anos de Adejaci Gomes da Silva Deija no dia 20 de Junho às 19h30. Confirme sua presença!">
    
    <!-- Google Fonts: Great Vibes (Cursiva), Cinzel (Títulos), Instrument Serif (Serifa Elegante) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Great+Vibes&family=Instrument+Serif:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    
    <!-- Link para o CSS customizado -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Canvas para efeito de estrelas/partículas douradas -->
    <canvas id="particles-canvas"></canvas>
    
    <!-- Tela de Abertura com o Envelope 3D de Luxo -->
    <div class="welcome-overlay" id="welcome-overlay">
        <div class="envelope-container">
            <div class="envelope" id="envelope">
                
                <!-- Aba Superior (Flap Top) que rotaciona em 3D -->
                <div class="envelope-flap-top">
                    <svg viewBox="0 0 100 55" preserveAspectRatio="none" class="flap-svg">
                        <polygon points="0,0 100,0 50,55" />
                    </svg>
                    <!-- Desenho de ramos e folhas em relevo sobre a aba superior -->
                    <div class="flap-leaves">
                        <svg viewBox="0 0 100 55" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.8" class="leaves-svg">
                            <path d="M15,10 C25,12 30,18 45,28" />
                            <path d="M22,12 C25,9 28,12 26,14" fill="rgba(255,255,255,0.06)" />
                            <path d="M30,16 C33,13 36,16 34,18" fill="rgba(255,255,255,0.06)" />
                            <path d="M85,10 C75,12 70,18 55,28" />
                            <path d="M78,12 C75,9 72,12 74,14" fill="rgba(255,255,255,0.06)" />
                            <path d="M70,16 C67,13 64,16 66,18" fill="rgba(255,255,255,0.06)" />
                        </svg>
                    </div>
                </div>
                
                <!-- Aba Esquerda (Flap Left) -->
                <div class="envelope-flap-left">
                    <svg viewBox="0 0 50 100" preserveAspectRatio="none" class="flap-svg">
                        <polygon points="0,0 0,100 50,50" />
                    </svg>
                </div>
                
                <!-- Aba Direita (Flap Right) -->
                <div class="envelope-flap-right">
                    <svg viewBox="0 0 50 100" preserveAspectRatio="none" class="flap-svg">
                        <polygon points="50,0 50,100 0,50" />
                    </svg>
                </div>
                
                <!-- Aba Inferior (Flap Bottom) -->
                <div class="envelope-flap-bottom">
                    <svg viewBox="0 0 100 60" preserveAspectRatio="none" class="flap-svg">
                        <polygon points="0,60 100,60 50,20" />
                    </svg>
                    <!-- Detalhe de folhas no centro inferior -->
                    <div class="bottom-leaves">
                        <svg viewBox="0 0 100 60" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.8" class="leaves-svg">
                            <path d="M50,28 C45,35 40,42 25,50" />
                            <path d="M50,28 C55,35 60,42 75,50" />
                            <path d="M48,34 C44,32 42,35 44,37" fill="rgba(255,255,255,0.06)" />
                            <path d="M52,34 C56,32 58,35 56,37" fill="rgba(255,255,255,0.06)" />
                        </svg>
                    </div>
                </div>
                
                <!-- Papel interno que simula o convite escorregando -->
                <div class="envelope-paper"></div>
                
                <!-- Selo de Cera Dourado com o relevo "80" -->
                <div class="wax-seal" id="wax-seal">
                    <span class="seal-text">80</span>
                </div>
                
                <!-- Dica para abrir -->
                <div class="open-hint animate-pulse-hint">Toque para abrir</div>
            </div>
        </div>
    </div>
    
    <!-- Wrapper principal para centralizar e dar efeito de profundidade no Desktop -->
    <div class="invite-wrapper">
        <main class="invite-card">
            
            <!-- Conteúdo do Convite -->
            <div class="invite-content">
                
                <!-- Cabeçalho com o nome em caligrafia cursiva -->
                <header class="invite-header animate-slide-up">
                    <h1 class="cursive-name">
                        <span class="first-name">Adejaci Gomes da Silva</span>
                        <span class="nickname">Deija</span>
                    </h1>
                </header>
                
                <!-- Detalhes do aniversário -->
                <section class="invite-body animate-slide-up" style="animation-delay: 0.2s;">
                    <h2 class="age-title">80 Anos</h2>
                    
                    <p class="tagline">Você está convidado para uma grande celebração!</p>
                    
                    <p class="date-time">20 de Junho as 19h30</p>
                    
                    <div class="location-container">
                        <p class="location-label">Local:</p>
                        <p class="location-value">Rua Benvindo Caetano, SN</p>
                    </div>
                </section>
                
                <!-- Botões de Ação -->
                <footer class="invite-footer animate-slide-up" style="animation-delay: 0.4s;">
                    <!-- Botão de RSVP Principal direcionado para o WhatsApp -->
                    <a href="https://wa.me/5574999003200?text=Ol%C3%A1!%20Gostaria%20de%20confirma%20a%20minha%20presen%C3%A7a%20no%20anivers%C3%A1rio!" 
                       target="_blank" 
                       rel="noopener noreferrer" 
                       class="btn btn-rsvp"
                       id="btn-rsvp">
                        <span class="btn-shine"></span>
                        <svg class="whatsapp-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.746.953 3.71 1.457 5.709 1.458h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                        </svg>
                        Confirmar Presença
                    </a>
                </footer>
                
            </div>
        </main>
    </div>
    
    <!-- Script principal para controle e interatividade -->
    <script src="script.js"></script>
</body>
</html>
